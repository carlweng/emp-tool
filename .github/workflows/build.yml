name: build
on: [push, pull_request]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest]
        build_type: [Debug, Release]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Locate OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"
      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DEMP_TOOL_NATIVE_ARCH=OFF
      - name: Build
        run: cmake --build build -j $(getconf _NPROCESSORS_ONLN)
      - name: Test
        run: ctest --test-dir build --output-on-failure

  # AddressSanitizer + UndefinedBehaviorSanitizer. One Ubuntu leg (LSan is
  # Linux-only); RelWithDebInfo for line numbers without Debug's slowdown.
  # detect_leaks=0 keeps the focus on memory corruption / UB rather than
  # exit-time leaks in test mains; UBSan halt_on_error=1 turns a detected
  # violation into a non-zero exit (default is print-and-continue).
  # -fno-sanitize=alignment: the SSE bit-transpose (block.hpp sse_trans) does
  # deliberate unaligned 2-byte stores into byte-addressed output; well-defined
  # on x86-64/arm64 and only reachable from the test's sub-16 dimensions (real
  # callers transpose 128-row blocks, which are aligned). Every other check stays on.
  sanitize:
    name: ASan + UBSan (Ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Configure (ASan + UBSan)
        run: |
          cmake -B build-san \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DEMP_TOOL_NATIVE_ARCH=OFF \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize=alignment -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize=alignment -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        run: cmake --build build-san -j $(getconf _NPROCESSORS_ONLN)
      - name: Test (ASan + UBSan)
        run: ctest --test-dir build-san --output-on-failure
        env:
          ASAN_OPTIONS: detect_leaks=0:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
